name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          python-version: ${{ matrix.python-version }}

      - name: Lint (ruff)
        run: uv run --extra dev ruff check .

      - name: Type-check (mypy)
        run: uv run --extra dev mypy

      - name: Run tests
        run: uv run --extra dev pytest

      # doe-service (workspace member) — ruff above already lints it repo-wide;
      # mypy and pytest are per-package, run from its directory.
      - name: Type-check doe-service (mypy)
        working-directory: doe-service
        run: uv run --extra dev mypy

      - name: Test doe-service
        working-directory: doe-service
        run: uv run --extra dev pytest
